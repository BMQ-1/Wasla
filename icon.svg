<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Deep slate/onyx background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0E"/>
      <stop offset="100%" style="stop-color:#15151C"/>
    </linearGradient>
    
    <!-- Premium pale gold accent gradient -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F2D088"/>
      <stop offset="100%" style="stop-color:#CBA052"/>
    </linearGradient>
    
    <!-- Subtle premium glow for the center node -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#F2D088" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Background with softer squircle rounding -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>

  <!-- Outer ambient dashed boundary -->
  <circle cx="256" cy="256" r="216" fill="none" stroke="url(#accent)" stroke-width="0.75" stroke-dasharray="2 12" opacity="0.2"/>
  
  <!-- Primary orbit ring -->
  <circle cx="256" cy="256" r="170" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.15"/>
  
  <!-- Inner framing ring -->
  <circle cx="256" cy="256" r="48" fill="none" stroke="url(#accent)" stroke-width="1" opacity="0.3"/>

  <!-- Minimalist connecting lines with precise gaps -->
  <g stroke="url(#accent)" stroke-width="1" opacity="0.35" stroke-linecap="round">
    <!-- N, S, E, W -->
    <line x1="256" y1="200" x2="256" y2="102"/>
    <line x1="256" y1="312" x2="256" y2="410"/>
    <line x1="312" y1="256" x2="410" y2="256"/>
    <line x1="200" y1="256" x2="102" y2="256"/>
    
    <!-- Diagonals -->
    <line x1="296" y1="216" x2="368" y2="144"/>
    <line x1="216" y1="216" x2="144" y2="144"/>
    <line x1="296" y1="296" x2="368" y2="368"/>
    <line x1="216" y1="296" x2="144" y2="368"/>
  </g>

  <!-- Orbiting Nodes -->
  <!-- Solid primary nodes -->
  <g fill="url(#accent)">
    <circle cx="256" cy="86" r="8"/>
    <circle cx="256" cy="426" r="8"/>
    <circle cx="426" cy="256" r="8"/>
    <circle cx="86" cy="256" r="8"/>
  </g>
  
  <!-- Hollow secondary nodes for depth/hierarchy -->
  <g fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.85">
    <circle cx="376" cy="136" r="5"/>
    <circle cx="136" cy="136" r="5"/>
    <circle cx="376" cy="376" r="5"/>
    <circle cx="136" cy="376" r="5"/>
  </g>

  <!-- Center hub -->
  <circle cx="256" cy="256" r="40" fill="url(#accent)" filter="url(#glow)"/>
  
  <!-- Modern sans-serif Arabic Waw -->
  <text x="256" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="34" fill="#0A0A0E" text-anchor="middle" dominant-baseline="central" font-weight="500">و</text>
</svg>
